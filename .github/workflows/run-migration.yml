name: Run DB Migration

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Nombre del script en scripts/ (ej: migrate-polls.js)'
        required: true
      confirm:
        description: 'Type YES to run on production DB'
        required: true
        default: 'NO'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'YES'
        run: |
          echo "❌ Confirmá escribiendo YES en el campo 'confirm'."
          exit 1

      - name: Validate script exists
        run: |
          SCRIPT="scripts/${{ github.event.inputs.script }}"
          if [ ! -f "$SCRIPT" ]; then
            echo "❌ Script no encontrado: $SCRIPT"
            exit 1
          fi
          echo "✓ Script encontrado: $SCRIPT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        run: node scripts/${{ github.event.inputs.script }}
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET:  ${{ secrets.JWT_SECRET }}
          NODE_ENV:    production

      - name: Done
        if: success()
        run: echo "✅ ${{ github.event.inputs.script }} ejecutado correctamente"
