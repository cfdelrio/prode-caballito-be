name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production dependencies
        run: |
          # Borrar node_modules para garantizar instalación limpia (sin caché de runs anteriores)
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create deployment package
        run: |
          # El checkout ahora tiene node_modules de producción limpios
          mkdir -p /tmp/lambda_deploy
          cp -r . /tmp/lambda_deploy/
          # Crear zip desde /tmp para que la estructura interna sea lambda_deploy/...
          cd /tmp
          zip -r deploy.zip lambda_deploy/ \
            --exclude "lambda_deploy/.git/*" \
            --exclude "lambda_deploy/.github/*"

      - name: Upload package to S3 and deploy Lambda
        run: |
          # Subir a S3 para evitar el límite de 50MB en uploads directos
          aws s3 cp /tmp/deploy.zip s3://prode-uploads-cdelrio/lambda/prode-api.zip \
            --region us-east-1

          aws lambda update-function-code \
            --function-name prode-api \
            --s3-bucket prode-uploads-cdelrio \
            --s3-key lambda/prode-api.zip \
            --region us-east-1

          # Esperar a que termine de actualizar
          aws lambda wait function-updated \
            --function-name prode-api \
            --region us-east-1

          echo "✅ Deploy completado"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1

      # ── TEMP: set test winner — revert after testing ──────────────────────────
      - name: Set test winner image (TEMP)
        run: |
          aws lambda invoke \
            --function-name prode-api \
            --payload "$(echo '{"source":"prode.set-winner","imageUrl":"https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=480&h=480&fit=crop&q=90","matchdayLabel":"🏆 Fecha de Prueba — cfdelrio"}' | base64)" \
            --cli-binary-format raw-in-base64-out \
            --region us-east-1 winner_output.json
          cat winner_output.json
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
