name: Test Weekly Email

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Email para envío de prueba'
        required: true
        default: 'cfdelrio@gmail.com'

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke Lambda with test email
        run: |
          aws lambda invoke \
            --function-name prode-api \
            --payload "$(echo '{"source":"prode.weekly","testEmail":"${{ github.event.inputs.test_email }}"}' | base64)" \
            --cli-binary-format raw-in-base64-out \
            --region us-east-1 \
            output.json
          echo "=== Resultado ==="
          cat output.json
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
